name: Release

# Changesets opens a "Version packages" PR (or publishes when on that PR).
# If the run fails with "GitHub Actions is not permitted to create or approve pull requests",
# either enable that permission for this repo (Settings → Actions → General → Workflow permissions),
# or add a fine-grained PAT with contents + pull requests as repo secret CHANGESETS_GITHUB_TOKEN.
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Changesets Release
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome check --changed --since=origin/main --no-errors-on-unmatched .
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @hostfunc/cli build
      - run: pnpm --dir ./packages/cli pack --pack-destination ../../tmp-pack
      - run: npm install -g ./tmp-pack/*.tgz
      - run: hostfunc help
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # PAT bypasses org rules that block GITHUB_TOKEN from opening PRs; falls back to default token.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
