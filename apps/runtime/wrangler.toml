name = "hostfunc-runtime"
main = "src/dispatch.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENV = "dev"
RUNTIME_INVOKE_TOKEN = "dev-runtime-invoke-token"

[[kv_namespaces]]
binding = "FN_INDEX"
id = "local-fn-index"

[[kv_namespaces]]
binding = "EGRESS_COUNTERS"
id = "local-egress-counters"

[[dispatch_namespaces]]
binding = "DISPATCHER"
namespace = "hostfunc-dev"
